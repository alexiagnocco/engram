<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="engram — a knowledge-compounding engine">
  <defs>
    <radialGradient id="bg" cx="32%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="45%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#05070e"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ce6c4"/>
      <stop offset="55%" stop-color="#6ad0ff"/>
      <stop offset="100%" stop-color="#9a8bff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a3a5c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4de2c4" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- ambient glow blooms -->
  <circle cx="250" cy="150" r="120" fill="#16e0b0" opacity="0.10" filter="url(#soft)"/>
  <circle cx="520" cy="210" r="140" fill="#7c6bff" opacity="0.09" filter="url(#soft)"/>

  <!-- memory-trace link graph: edges -->
  <g stroke="url(#edge)" stroke-width="1.6" fill="none" opacity="0.85">
    <line x1="92" y1="172" x2="160" y2="92"/>
    <line x1="92" y1="172" x2="162" y2="250"/>
    <line x1="160" y1="92" x2="232" y2="150"/>
    <line x1="162" y1="250" x2="232" y2="150"/>
    <line x1="162" y1="250" x2="250" y2="232"/>
    <line x1="232" y1="150" x2="302" y2="92"/>
    <line x1="232" y1="150" x2="322" y2="200"/>
    <line x1="250" y1="232" x2="322" y2="200"/>
    <line x1="302" y1="92" x2="372" y2="142"/>
    <line x1="322" y1="200" x2="372" y2="142"/>
    <line x1="372" y1="142" x2="438" y2="168"/>
  </g>

  <!-- nodes (brighter = stronger trace / higher learned utility) -->
  <g fill="#22304c">
    <circle cx="92" cy="172" r="6"/>
    <circle cx="160" cy="92" r="5"/>
    <circle cx="250" cy="232" r="5"/>
    <circle cx="302" cy="92" r="6"/>
  </g>
  <g fill="#5fe6cf" filter="url(#glow)">
    <circle cx="162" cy="250" r="7"/>
    <circle cx="232" cy="150" r="9.5"/>
    <circle cx="322" cy="200" r="7.5"/>
    <circle cx="372" cy="142" r="5.5"/>
  </g>

  <!-- wordmark -->
  <text x="448" y="205" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="148" font-weight="600" letter-spacing="-4" fill="url(#ink)" filter="url(#glow)">engram</text>
  <text x="452" y="252" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="23" letter-spacing="4" fill="#8aa0c4">a knowledge-compounding engine</text>
  <text x="453" y="290" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="19" letter-spacing="2" fill="#4de2c4" opacity="0.85">&#963; &#183; &#961;  &gt;  &#948; / 100</text>
</svg>
