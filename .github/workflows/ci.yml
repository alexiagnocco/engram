name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint · type · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _meta/mcp-server-py
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (dev + embeddings)
        run: uv sync --extra dev --extra embeddings

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest -q
